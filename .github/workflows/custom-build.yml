name: Custom Magisk Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: '自定义包名'
        required: true
        default: 'com.example.magisk'
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Change package name with Python
        run: |
          # 创建 Python 脚本
          cat > change_pkg.py << 'EOF'
          #!/usr/bin/env python3
          import os
          import sys
          from pathlib import Path
          
          old_pkg = "com.topjohnwu.magisk"
          new_pkg = sys.argv[1]
          
          def replace_in_file(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                  if old_pkg not in content:
                      return False
                  new_content = content.replace(old_pkg, new_pkg)
                  new_content = new_content.replace(f"{old_pkg}.stub", f"{new_pkg}.stub")
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  return True
              except:
                  return False
          
          extensions = ('.kt', '.kts', '.java', '.cpp', '.c', '.h', '.hpp', '.xml', '.gradle')
          count = 0
          
          for root, dirs, files in os.walk('.'):
              if '.git' in dirs:
                  dirs.remove('.git')
              for file in files:
                  file_path = Path(root) / file
                  if file_path.suffix in extensions or file in ['build.gradle', 'AndroidManifest.xml']:
                      if replace_in_file(file_path):
                          print(f"Modified: {file_path}")
                          count += 1
          
          print(f"Modified {count} files")
          EOF
          
          python3 change_pkg.py "${{ github.event.inputs.package_name }}"
      
      - name: Setup environment
        uses: ./.github/actions/setup
      
      - name: Build
        run: ./build.py -v all
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: magisk-${{ github.event.inputs.package_name }}
          path: out
