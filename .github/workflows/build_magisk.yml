name: Magisk 自动构建 & 定制修改
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y zip unzip tar git wget libncurses5

      # ==============================================
      # 核心：Magisk 源码自动修改（包名、字符串、文件）
      # ==============================================
      - name: 自动修改源码 & 包名
        run: |
          # ========== 你只需要改这里 ==========
          OLD_PACKAGE="com.topjohnwu.magisk"
          NEW_PACKAGE="com.yourname.magisk"
          
          # 批量替换包名（适配 Magisk 真实目录结构）
          echo "🔧 开始替换包名..."
          find . -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle" | xargs sed -i "s/${OLD_PACKAGE}/${NEW_PACKAGE}/g"

          # 可选：自定义修改示例
          # 示例：修改应用名称
          sed -i 's/app_name>Magisk</app_name>MyMagisk</g' app/src/main/res/values/strings.xml
          # 示例：修改包名
          sed -i "s/${OLD_PACKAGE}/${NEW_PACKAGE}/g" app/build.gradle.kts
          
          echo "✅ 源码修改完成"

      - name: 构建 Magisk
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        
      - name: 打包输出模块
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/*.apk output/
          zip -r -9 Magisk-Module.zip output/*
          ls -al

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: Magisk-Build
          path: |
            *.zip
            app/build/outputs/apk/release/*.apk
