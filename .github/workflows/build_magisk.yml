name: Magisk 自动构建 & 定制修改
on:
  workflow_dispatch:
    inputs:
      new_package:
        description: '新包名 (例如: com.yourname.magisk)'
        required: true
        default: 'com.custom.magisk'
      app_name:
        description: '应用显示名称'
        required: true
        default: 'CustomMagisk'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y zip unzip tar git wget libncurses5 \
            build-essential cmake python3

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: 配置构建参数（官方方法）
        run: |
          # 创建 config.prop 文件来覆盖默认配置
          cat > config.prop << EOF
          # 自定义包名
          magisk.applicationId=${{ github.event.inputs.new_package }}
          # 自定义应用名称
          magisk.appName=${{ github.event.inputs.app_name }}
          EOF
          
          echo "✅ 配置文件已创建"
          cat config.prop

      - name: 构建 Magisk
        run: |
          # 设置 Java 环境变量
          export JAVA_HOME=$JAVA_HOME
          export PATH=$JAVA_HOME/bin:$PATH
          
          # 验证 Java 版本
          java -version
          
          # 使用配置文件构建
          cd app
          chmod +x gradlew
          
          # 直接构建（不使用源码修改）
          echo "开始构建..."
          ./gradlew assembleRelease --stacktrace --no-daemon
          
          cd ..

      - name: 收集构建产物
        run: |
          mkdir -p output
          
          # 收集所有生成的 APK
          find . -type f -name "*.apk" -path "*/build/outputs/*" | while read apk; do
            cp "$apk" output/
            echo "  ✓ 复制: $(basename $apk)"
          done
          
          # 列出所有产物
          if [ -n "$(ls -A output/ 2>/dev/null)" ]; then
            echo "=== 构建产物列表 ==="
            ls -la output/
            cd output
            zip -r "../Magisk-${{ github.event.inputs.app_name }}-$(date +%Y%m%d-%H%M%S).zip" .
            cd ..
          else
            echo "⚠️ 警告: 未找到 APK 文件"
            # 调试：显示构建输出目录
            find app -type d -name "outputs" -exec ls -la {} \;
          fi

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: Magisk-Custom-Build-${{ github.event.inputs.app_name }}
          path: |
            Magisk-*.zip
            output/*.apk
          retention-days: 7
          if-no-files-found: warn
