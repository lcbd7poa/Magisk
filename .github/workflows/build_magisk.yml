name: Magisk Debug Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk libncurses5

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 尝试构建（不修改任何内容）
        run: |
          cd app
          chmod +x gradlew
          ./gradlew tasks --all
