name: Magisk Auto Build (Simplified)
on:
  workflow_dispatch:
    inputs:
      new_package:
        description: '新包名'
        required: true
        default: 'com.custom.magisk'
      app_name:
        description: '应用名称'
        required: true
        default: 'CustomMagisk'

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04，兼容性更好
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: 安装依赖 (Ubuntu 22.04)
        run: |
          sudo apt update
          # Ubuntu 22.04 有 libncurses5
          sudo apt install -y zip unzip tar git wget libncurses5 \
            openjdk-17-jdk build-essential cmake python3

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: 修改包名
        run: |
          OLD_PKG="com.topjohnwu.magisk"
          NEW_PKG="${{ github.event.inputs.new_package }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          # 替换文本内容
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle*" \) \
            -exec sed -i "s/${OLD_PKG}/${NEW_PKG}/g" {} \;
          
          # 移动目录
          NEW_PATH=$(echo $NEW_PKG | tr '.' '/')
          for dir in app/apk/src/main/java app/core/src/main/java; do
            if [ -d "$dir/com/topjohnwu/magisk" ]; then
              mkdir -p "$dir/$NEW_PATH"
              cp -r "$dir/com/topjohnwu/magisk/"* "$dir/$NEW_PATH/"
              rm -rf "$dir/com"
            fi
          done
          
          # 改应用名
          sed -i 's/app_name>Magisk</app_name>'"${APP_NAME}"'</g' \
            app/core/src/main/res/values/strings.xml

      - name: 构建
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: magisk-build
          path: app/**/build/outputs/**/*.apk
