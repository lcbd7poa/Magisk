name: Build Magisk With Custom Package Name

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # 必须用macOS，Ubuntu编译失败
    steps:
      - name: Checkout Magisk Source
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Build Environment
        uses: ./.github/actions/setup
        with:
          is-asset-build: true

      # ====================== 【修改你想要的包名】 ======================
      - name: Change Magisk Package Name
        run: |
          NEW_PKG="com.my.magisk" # 改成你自己的包名

          echo "New package name: $NEW_PKG"

          # 新版 Magisk 包名路径
          sed -i '' "s/applicationId = \"com.topjohnwu.magisk\"/applicationId = \"$NEW_PKG\"/" app/build.gradle.kts
          sed -i '' "s/\"com.topjohnwu.magisk\"/\"$NEW_PKG\"/" app/src/main/AndroidManifest.xml
          find app -type f -name "*.kt" -o -name "*.java" | xargs sed -i '' "s/com.topjohnwu.magisk/$NEW_PKG/g"

      # ====================== 编译 ======================
      - name: Build Magisk
        run: python3 build.py -vr all

      # ====================== 上传成品 ======================
      - name: Upload Build Output
        uses: actions/upload-artifact@v7
        with:
          name: Magisk-Custom-Package
          path: out/
